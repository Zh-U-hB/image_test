<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你的清华SIGS</title>
<link rel="stylesheet" href="/assets/leaflet.css" />
<style>
:root {
  --accent: #7c3aed; --accent2: #a78bfa; --bg: #0a0a0f;
  --card-bg: rgba(20,20,30,0.95); --text: #f0f0f5; --text2: #aaa;
  --radius: 14px; --minimap-w: 260px; --minimap-h: 200px;
  --sidebar-w: 400px;
  --topbar-h: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow-x:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }

.page { position:relative; min-height:100vh; width:100%; display:none; }
.page.active { display:flex; }
#page-map { position:fixed; inset:0; } /* map stays fixed fullscreen */

/* ── Auth ─────────────────────────── */
#page-auth {
  flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at center, #1a1030 0%, var(--bg) 70%);
  padding:80px 20px 40px; min-height:100vh;
}

/* ── Welcome ──────────────────────── */
#page-welcome {
  flex-direction:column; align-items:center; justify-content:flex-start;
  background: radial-gradient(ellipse at center, #1a1030 0%, var(--bg) 70%);
  text-align:center; gap:16px;
  padding:100px 20px 60px; min-height:100vh; overflow-y:auto;
}
#page-welcome h1 { font-size:clamp(36px,8vw,64px); font-weight:900; letter-spacing:-2px;
  background:linear-gradient(135deg,#a78bfa,#7c3aed,#4c1d95); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; }
#page-welcome .tagline { font-size:18px; color:var(--text2); max-width:500px; }
.btn-group { display:flex; gap:14px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
.btn {
  padding:14px 32px; border-radius:28px; border:none; font-size:16px; font-weight:700;
  cursor:pointer; transition:all .2s; font-family:inherit; letter-spacing:.3px;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#6d28d9; transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,58,237,.35); }
.btn-outline { background:transparent; color:var(--text); border:2px solid rgba(255,255,255,.2); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.btn-sm { padding:8px 20px; font-size:14px; }

/* ── Settings overlay ─────────────── */
#settings-overlay {
  position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.7);
  display:none; align-items:center; justify-content:center;
}
#settings-overlay.show { display:flex; }
.settings-panel {
  background:var(--card-bg); border-radius:var(--radius); padding:32px;
  min-width:340px; backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.1);
}
.settings-panel h2 { margin-bottom:20px; font-size:20px; }
.lang-option {
  display:flex; align-items:center; gap:10px; padding:12px 16px; margin:6px 0;
  border-radius:10px; cursor:pointer; border:1px solid rgba(255,255,255,.1); transition:all .2s;
}
.lang-option:hover { border-color:var(--accent); }
.lang-option.selected { border-color:var(--accent); background:rgba(124,58,237,.15); }
.lang-option input { accent-color:var(--accent); }

/* ── Map page ──────────────────────── */
#page-map { flex-direction:column; }
#map-wrap { flex:1; position:relative; min-height:0; }
#map-main { position:absolute; inset:0; }

/* Topbar */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:60; padding:10px 20px;
  background:rgba(10,10,15,.92); backdrop-filter:blur(10px);
  display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,.08);
  transition:background .4s;
}
#topbar.transparent { background:rgba(0,0,0,.4); border-bottom-color:rgba(255,255,255,.06); }
#topbar h2 { font-size:17px; font-weight:700; }
#topbar .badge { font-size:11px; background:var(--accent); color:#fff; padding:3px 10px; border-radius:12px; font-weight:600; }
#topbar .count { font-size:13px; color:var(--text2); margin-left:auto; }
#topbar .topbar-btn {
  background:transparent; color:var(--text); border:1px solid rgba(255,255,255,.15);
  padding:6px 14px; border-radius:16px; cursor:pointer; font-size:13px; font-family:inherit;
  transition:all .2s;
}
#topbar .topbar-btn:hover { border-color:var(--accent); color:var(--accent); }
#topbar .topbar-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Mode toggle */
#mode-toggle {
  position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:61;
  display:none; gap:0; background:rgba(0,0,0,.65); border-radius:24px; padding:4px;
  backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.1);
}
.mode-btn {
  padding:10px 22px; border-radius:22px; border:none; background:transparent;
  color:rgba(255,255,255,.7); cursor:pointer; font-size:14px; font-weight:600;
  transition:all .2s; font-family:inherit; white-space:nowrap;
}
.mode-btn.active { background:var(--accent); color:#fff; }

/* ── Panorama layer ────────────────── */
#pano-layer {
  position:fixed; inset:0; z-index:50; background:#000;
  opacity:0; pointer-events:none; transition:opacity .4s;
}
#pano-layer.active { opacity:1; pointer-events:auto; }
#pano-canvas-wrap { width:100%; height:100%; cursor:grab; }
#pano-canvas-wrap:active { cursor:grabbing; }

/* Pano controls */
#pano-controls {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:62;
  display:flex; gap:8px; opacity:0; pointer-events:none; transition:opacity .4s;
}
#pano-controls.show { opacity:1; pointer-events:auto; }
.pano-btn {
  width:40px; height:40px; border-radius:50%; border:none;
  background:rgba(0,0,0,.45); backdrop-filter:blur(8px);
  color:#fff; cursor:pointer; font-size:18px; display:flex; align-items:center;
  justify-content:center; transition:background .2s;
}
.pano-btn:hover { background:rgba(0,0,0,.65); }
.pano-btn.active { background:var(--accent); }

#pano-loading {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:62;
  display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.7); font-size:14px;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#pano-loading.show { opacity:1; }
.pano-spinner {
  width:28px; height:28px; border:3px solid rgba(255,255,255,.15);
  border-top:3px solid var(--accent); border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

#pano-hint {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  z-index:62; color:rgba(255,255,255,.45); font-size:13px;
  pointer-events:none; transition:opacity .6s; opacity:0;
}
#pano-hint.show { opacity:1; }
#pano-hint.fade { opacity:0; }

#pano-id-tag {
  position:fixed; top:60px; left:50%; transform:translateX(-50%); z-index:62;
  color:rgba(255,255,255,.75); font-size:13px; font-weight:600;
  pointer-events:none; opacity:0; transition:opacity .4s;
}
#pano-id-tag.show { opacity:1; }
#pano-close-btn {
  position:fixed; top:14px; right:20px; z-index:65; width:36px; height:36px;
  border-radius:50%; border:none; background:rgba(0,0,0,.5); color:#fff;
  font-size:20px; cursor:pointer; display:none; align-items:center; justify-content:center;
}
#pano-close-btn.show { display:flex; }

/* Minimap */
#minimap {
  position:fixed; bottom:20px; left:20px; z-index:62;
  width:var(--minimap-w); height:var(--minimap-h); border-radius:12px; overflow:hidden;
  border:2px solid rgba(255,255,255,.85); box-shadow:0 4px 20px rgba(0,0,0,.35);
  opacity:0; transform:translateY(10px); transition:opacity .4s,transform .4s;
  pointer-events:none;
}
#minimap.show { opacity:1; transform:translateY(0); pointer-events:auto; }
#minimap .leaflet-control-zoom, #minimap .leaflet-control-attribution { display:none; }
#minimap-label {
  position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:5;
  background:rgba(0,0,0,.6); color:#fff; padding:2px 10px; border-radius:10px;
  font-size:11px; font-weight:600; pointer-events:none;
}

/* ── AI Agent Sidebar ──────────────── */
#agent-sidebar {
  position:fixed; right:0; top:0; bottom:0; z-index:63;
  width:var(--sidebar-w); background:var(--card-bg); backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.08);
  transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; overflow-y:auto;
}
#agent-sidebar.open { transform:translateX(0); }
#agent-header {
  padding:20px; border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
#agent-header h3 { font-size:17px; font-weight:700; }
#agent-body { flex:1; padding:20px; overflow-y:auto; }
.agent-round-label { font-size:12px; color:var(--accent2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.agent-round-title { font-size:20px; font-weight:700; margin-bottom:16px; }

.opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.opt-card {
  padding:20px 12px; border-radius:12px; text-align:center; cursor:pointer;
  border:2px solid rgba(255,255,255,.08); transition:all .2s;
  background:rgba(255,255,255,.03);
}
.opt-card:hover { border-color:var(--accent2); background:rgba(124,58,237,.1); }
.opt-card.selected { border-color:var(--accent); background:rgba(124,58,237,.2); box-shadow:0 0 16px rgba(124,58,237,.25); }
.opt-card .icon { font-size:32px; margin-bottom:8px; line-height:1; }
.opt-card .name { font-size:14px; font-weight:600; }

#prompt-preview {
  background:rgba(0,0,0,.3); border-radius:10px; padding:14px; margin:16px 0;
  font-size:13px; color:var(--text2); line-height:1.6; min-height:40px;
  border:1px solid rgba(255,255,255,.06);
}
#prompt-preview strong { color:var(--accent2); }
#system-prompt-input {
  width:100%; background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:12px; color:var(--text); font-size:13px;
  font-family:inherit; resize:vertical; min-height:60px; margin-bottom:16px;
}
#agent-generate-btn { width:100%; margin-top:12px; display:none; }
#agent-generate-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Chat UI */
#agent-chat { flex:1; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:12px; min-height:0; }
.chat-msg { max-width:88%; padding:12px 16px; border-radius:16px; font-size:13px; line-height:1.55; word-break:break-word; animation:msgIn .3s ease-out; }
.chat-msg.agent { align-self:flex-start; background:rgba(255,255,255,.08); border-bottom-left-radius:4px; }
.chat-msg.player { align-self:flex-end; background:var(--accent); border-bottom-right-radius:4px; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.agent-loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:32px 20px; animation:msgIn .4s ease-out; }
.agent-loading-spinner { width:44px; height:44px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.agent-loading-text { font-size:13px; color:var(--text2); text-align:center; line-height:1.6; }
.agent-loading-dots::after { content:""; animation:dots 1.5s steps(4,end) infinite; }
@keyframes dots { 0%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
#agent-bottom { margin-top:12px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
#agent-options { display:flex; flex-direction:column; gap:6px; }
#agent-options button {
  width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04); color:var(--text); cursor:pointer;
  font-size:13px; font-family:inherit; text-align:left; transition:all .2s;
}
#agent-options button:hover { border-color:var(--accent); background:rgba(124,58,237,.12); }
#agent-input-row input::placeholder { color:rgba(255,255,255,.3); }

/* Fallback hidden */
#prompt-preview, #system-prompt-input { display:none; }

/* Generation loading */
#gen-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.85); z-index:5;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#gen-overlay.show { display:flex; }
.gen-ring {
  width:80px; height:80px; border-radius:50%;
  border:4px solid rgba(255,255,255,.1); border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}
.gen-timer { font-size:24px; font-weight:700; color:var(--accent2); }
.gen-prompt-preview { font-size:13px; color:var(--text2); max-width:400px; text-align:center; line-height:1.5; }

/* ── Community ──────────────────────── */
#page-community { flex-direction:column; padding-top:var(--topbar-h); min-height:100vh; }
#community-topbar {
  padding:12px 20px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08); flex-shrink:0;
  background:rgba(10,10,15,.95); flex-wrap:wrap;
}
#community-topbar h2 { font-size:20px; font-weight:700; }
#community-topbar .spacer { flex:1; }
.sort-btn {
  padding:6px 16px; border-radius:16px; border:1px solid rgba(255,255,255,.15);
  background:transparent; color:var(--text); cursor:pointer; font-size:13px;
  font-family:inherit; transition:all .2s;
}
.sort-btn.active { background:var(--accent); border-color:var(--accent); }

#community-grid {
  flex:1; overflow-y:auto; padding:20px;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px; align-content:start; max-width:1200px; width:100%; margin:0 auto;
}
.community-card {
  background:var(--card-bg); border-radius:var(--radius); overflow:hidden;
  border:1px solid rgba(255,255,255,.06); cursor:pointer; transition:all .2s;
}
.community-card:hover { transform:translateY(-3px); border-color:var(--accent2); box-shadow:0 8px 24px rgba(0,0,0,.4); }
.community-card img { width:100%; height:180px; object-fit:cover; }
.community-card .card-body { padding:14px; }
.community-card .card-prompt { font-size:12px; color:var(--text2); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:8px; }
.community-card .card-meta { display:flex; align-items:center; justify-content:space-between; font-size:13px; }
.community-card .card-likes { color:var(--accent2); font-weight:600; }
.community-card .card-author { color:var(--text2); font-size:12px; }

.community-empty { text-align:center; padding:60px 20px; color:var(--text2); grid-column:1/-1; }
.community-empty .empty-icon { font-size:56px; margin-bottom:12px; }

/* Community pano overlay */
#community-pano-overlay {
  position:fixed; inset:0; z-index:70; background:#000;
  display:none; flex-direction:column;
}
#community-pano-overlay.show { display:flex; }
#comm-pano-topbar {
  padding:14px 20px; display:flex; align-items:center; gap:12px;
  background:rgba(0,0,0,.6); z-index:2; flex-shrink:0;
}
#comm-pano-topbar h3 { font-size:15px; flex:1; }
#comm-pano-canvas { flex:1; cursor:grab; }
#comm-pano-canvas:active { cursor:grabbing; }
#comm-pano-actions {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:5;
  display:flex; gap:8px;
}
.comm-action-btn {
  width:44px; height:44px; border-radius:50%; border:none;
  background:rgba(0,0,0,.45); backdrop-filter:blur(8px); color:#fff;
  cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.comm-action-btn:hover { background:rgba(0,0,0,.7); }
.comm-action-btn.liked { color:#ff3b6e; }
.comm-action-btn .like-count { font-size:11px; margin-left:2px; }

/* Responsive */
@media (max-width:768px) {
  :root { --sidebar-w:100vw; --minimap-w:130px; --minimap-h:100px; --topbar-h:44px; }
  .page { padding-left:12px; padding-right:12px; }
  #page-map, #page-auth, #page-welcome, #page-community { padding-left:0; padding-right:0; }
  #page-welcome { padding-top:80px; padding-bottom:40px; }
  #page-auth { padding-top:60px; }
  #page-community { padding-top:44px; }
  .btn-group { flex-direction:column; align-items:center; }
  .opt-grid { grid-template-columns:1fr 1fr; }
  #mode-toggle { top:46px; }
  .mode-btn { padding:8px 14px; font-size:12px; }
  #topbar { padding:8px 12px; gap:6px; flex-wrap:wrap; }
  #topbar h2 { font-size:13px; white-space:nowrap; }
  #topbar .badge { font-size:10px; padding:2px 8px; }
  #topbar .count { font-size:11px; }
  #topbar .topbar-btn { font-size:11px; padding:5px 10px; }
  #community-topbar { padding:10px 12px; gap:8px; }
  #community-topbar h2 { font-size:16px; }
  .sort-btn { font-size:11px; padding:5px 12px; }
  #community-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; padding:12px; }
  .community-card img { height:130px; }
  .community-card .card-body { padding:10px; }
  .community-card .card-prompt { font-size:11px; }
  #pano-close-btn { top:8px; right:8px; width:30px; height:30px; font-size:16px; }
  #pano-controls { bottom:16px; gap:4px; }
  .pano-btn { width:34px; height:34px; font-size:16px; }
  #pano-id-tag { top:48px; font-size:11px; }
  #agent-header { padding:12px 14px; }
  #agent-header h3 { font-size:15px; }
  #agent-body { padding:12px; }
  .settings-panel { min-width:auto; width:90%; max-width:380px; padding:24px; }
  /* Mobile: agent sidebar as bottom half-sheet */
  #agent-sidebar {
    top: auto; bottom: 0; left: 0; right: 0;
    width: 100%; height: 52vh;
    transform: translateY(100%);
    border-left: none; border-top: 1px solid rgba(255,255,255,.12);
    border-radius: 16px 16px 0 0;
  }
  #agent-sidebar.open { transform: translateY(0); }
  /* Drag handle indicator */
  #agent-header::before {
    content: ""; display: block;
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,.3); margin: 0 auto 8px;
  }
  #pano-close-btn { top: 8px; right: 8px; width: 30px; height: 30px; font-size: 16px; }
  #mode-toggle { top: 46px; }
}
@media (max-width:400px) {
  #topbar h2 { font-size:11px; }
  #topbar .topbar-btn { font-size:10px; padding:4px 8px; }
  #topbar .badge { display:none; }
  #topbar .count { font-size:10px; }
  #community-grid { grid-template-columns:1fr 1fr; gap:8px; padding:8px; }
  .community-card img { height:100px; }
  #my-designs-grid { grid-template-columns:1fr 1fr !important; }
}
</style>
</head>
<body>

<!-- ════ AUTH PAGE ════ -->
<div id="page-auth" class="page active">
  <div style="text-align:center;max-width:380px;width:90%;">
    <h1 style="font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#a78bfa,#7c3aed,#4c1d95);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">你的清华SIGS</h1>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px;">登录或注册以开始探索</p>
    <div id="auth-form">
      <input type="text" id="auth-username" placeholder="用户名" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:15px;font-family:inherit;margin-bottom:10px;outline:none;">
      <input type="password" id="auth-password" placeholder="密码" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:15px;font-family:inherit;margin-bottom:6px;outline:none;">
      <p id="auth-hint" style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:16px;">用户名和密码尽量简单即可，无需邮箱或手机号</p>
      <div id="auth-error" style="color:#ff3b30;font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-primary" onclick="authAction()" style="width:100%;margin-bottom:8px;" id="auth-btn">注册</button>
      <button class="btn btn-outline btn-sm" onclick="toggleAuthMode()" style="width:100%;" id="auth-toggle">已有账号？去登录</button>
    </div>
  </div>
</div>

<!-- ════ WELCOME PAGE ════ -->
<div id="page-welcome" class="page active">
  <h1>你的清华SIGS</h1>
  <p class="tagline">探索校园，用AI重新设计你的视角<br>Explore campus, redesign your perspective with AI</p>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="navigate('map')">开始游戏</button>

  const lang = state.language === "en" ? "en" : "cn";

  Object.entries(params).forEach(([k,v])=>{ text = text.replace(`{${k}}`,v); });

// ═══════════════════════════════════════
//  State & Persistence
// ═══════════════════════════════════════
const state = {
  language: localStorage.getItem("sigs_language") || "cn",
  route: "auth", mode: "explore",
  username: "", loggedIn: false, authMode: "register", isAdmin: false,
  mapPoints: [], currentPoint: null,
  designSelections: { style:null, color:null, elements:null, atmosphere:null },
  designRound: 1, compiledPrompt: "", systemPrompt: "",
  genTaskId: null, genTimer: null, genResult: null, pollingTimer: null,

  userLikes: {},
  communitySort: "hot",

  agentSessionId: "", agentPhase: "guiding", agentRound: 0, useLLM: true,
};
window.state = state;

function savePosts() { localStorage.setItem("sigs_community_posts", JSON.stringify(state.communityPosts)); }
function saveLikes() { localStorage.setItem("sigs_user_likes", JSON.stringify(state.userLikes)); }
function saveLang() { localStorage.setItem("sigs_language", state.language); }

// ═══════════════════════════════════════
//  Router & Page Render
// ═══════════════════════════════════════
function navigate(route) {
  if (route !== "auth" && !state.loggedIn) {
    state.route = "auth";
    window.location.hash = "auth";
    renderPage();
    return;
  }
  state.route = route;
  window.location.hash = route;
  renderPage();
}
window.addEventListener("hashchange", () => {
  const r = window.location.hash.replace("#","") || "auth";
  if (state.route !== r) { state.route = r; renderPage(); }
});

// ═══════════════════════════════════════
//  Auth
// ═══════════════════════════════════════
async function checkAuth() {
  try {
    const resp = await fetch("/api/auth/me");
    const data = await resp.json();
    if (data.logged_in) {
      state.loggedIn = true;
      state.username = data.username;
      state.isAdmin = data.admin || false;
      state.route = "welcome";
    }
  } catch(e) { console.warn("Auth check failed"); }
}

async function authAction() {
  const username = document.getElementById("auth-username").value.trim();
  const password = document.getElementById("auth-password").value.trim();
  const errEl = document.getElementById("auth-error");
  if (!username || !password) { errEl.textContent = "请填写用户名和密码"; errEl.style.display = "block"; return; }
  const mode = state.authMode;
  const url = mode === "login" ? "/api/auth/login" : "/api/auth/register";
  try {
    const resp = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({username, password}) });
    const data = await resp.json();
    if (data.error) {
      if (mode === "login" && data.error.includes("用户名或密码错误")) {
        errEl.innerHTML = data.error + '<br><span style="font-size:11px;color:rgba(255,255,255,.4);">如果是新用户，请先切换到"注册"模式</span>';
      } else {
        errEl.textContent = data.error;
      }
      errEl.style.display = "block"; return;
    }
    state.loggedIn = true; state.username = data.username;
    // Also check admin status
    try { const me = await (await fetch("/api/auth/me")).json(); state.isAdmin = me.admin || false; } catch(e) {}
    navigate("welcome");
  } catch(e) { errEl.textContent = "网络错误"; errEl.style.display = "block"; }
}

function toggleAuthMode() {
  state.authMode = state.authMode === "login" ? "register" : "login";
  document.getElementById("auth-btn").textContent = state.authMode === "login" ? "登录" : "注册";
  document.getElementById("auth-toggle").textContent = state.authMode === "login" ? "还没有账号？去注册" : "已有账号？去登录";
  document.getElementById("auth-hint").style.display = state.authMode === "register" ? "block" : "none";
}

async function logout() {
  await fetch("/api/auth/logout", { method:"POST" });
  state.loggedIn = false; state.username = "";
  navigate("auth");
}
window.logout = logout;
window.addEventListener("hashchange", () => {
  const r = window.location.hash.replace("#","") || "welcome";
  if (state.route !== r) { state.route = r; renderPage(); }
});

function renderPage() {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const page = document.getElementById("page-"+state.route);
  if (page) page.classList.add("active");

  // When navigating away from map, always clean up global overlays
  if (state.route !== "map") {
    resetGenOverlay();
    try { document.getElementById("agent-sidebar").classList.remove("open"); } catch(e) {}
    try { document.getElementById("mode-toggle").style.display = "none"; } catch(e) {}
    try { document.getElementById("pano-layer").classList.remove("active"); } catch(e) {}
    try { document.getElementById("pano-close-btn").classList.remove("show"); } catch(e) {}
    try { document.getElementById("pano-controls").classList.remove("show"); } catch(e) {}
    try { document.getElementById("minimap").classList.remove("show"); } catch(e) {}
    try { document.getElementById("topbar").classList.remove("transparent"); } catch(e) {}
  }

  // Auth page
  if (state.route === "auth") {
    document.getElementById("topbar").style.display = "none";
    return;
  }

  // Topbar user info
  const topbar = document.getElementById("topbar");
  const communityBtn = document.getElementById("community-nav-btn");
  if (communityBtn && state.loggedIn) {
    communityBtn.textContent = "👤 " + state.username + " | 社区";
  }
  const homeBtn = topbar.querySelector(".topbar-btn");
  if (homeBtn && state.route === "welcome" && state.loggedIn) {
    homeBtn.textContent = "退出登录";
    homeBtn.onclick = logout;
  } else if (homeBtn && state.route !== "welcome") {
    homeBtn.textContent = "🏠 首页";
    homeBtn.onclick = () => navigate("welcome");
  }

  // Welcome text
  document.querySelector("#page-welcome h1").textContent = t("welcome_title");
  document.querySelector("#page-welcome .tagline").innerHTML = t("welcome_tagline");
  document.querySelector("#page-welcome .btn-group").children[0].textContent = t("btn_start");
  document.querySelector("#page-welcome .btn-group").children[1].textContent = t("btn_tutorial");
  document.querySelector("#page-welcome .btn-group").children[2].textContent = t("btn_settings");

  // Map page text (null-safe)
  const q = (sel, fn) => { const el = document.querySelector(sel); if (el) fn(el); };
  q("#topbar h2", el => el.textContent = t("map_title"));
  q("#topbar .badge", el => el.textContent = t("map_badge"));
  q("#mode-explore", el => el.textContent = t("mode_explore"));
  q("#mode-design", el => el.textContent = t("mode_design"));
  q("#pano-hint", el => el.textContent = t("pano_hint"));
  q("#pano-loading-text", el => el.textContent = t("pano_loading"));
  q("#agent-header h3", el => el.textContent = "🤖 "+t("agent_title"));
  q("#gen-cancel-btn", el => el.textContent = t("agent_cancel"));

  // Community page
  q("#community-topbar h2", el => el.textContent = t("community_title"));
  q("#sort-hot", el => el.textContent = t("community_hot"));
  q("#sort-new", el => el.textContent = t("community_new"));

  // Show/hide global UI based on route
  const modeToggle = document.getElementById("mode-toggle");
  if (state.route === "map") {
    topbar.style.display = "flex";
    modeToggle.style.display = "none";
    initMapPage();
  } else if (state.route === "welcome") {
    topbar.style.display = state.loggedIn ? "flex" : "none";
    modeToggle.style.display = "none";
    loadMyDesigns();
  } else if (state.route === "community") {
    topbar.style.display = "flex";
    modeToggle.style.display = "none";
    renderCommunity();
  } else {
    topbar.style.display = "none";
    modeToggle.style.display = "none";
  }
}

// ═══════════════════════════════════════
//  Settings
// ═══════════════════════════════════════
function toggleSettings() {
  const ov = document.getElementById("settings-overlay");
  ov.classList.toggle("show");
  if (ov.classList.contains("show")) {
    document.getElementById("lang-cn").classList.toggle("selected", state.language==="cn");
    document.getElementById("lang-en").classList.toggle("selected", state.language==="en");
    document.querySelector("#lang-cn input").checked = (state.language==="cn");
    document.querySelector("#lang-en input").checked = (state.language==="en");
  }
}
function setLang(lang) {
  state.language = lang; saveLang();
  document.getElementById("lang-cn").classList.toggle("selected", lang==="cn");
  document.getElementById("lang-en").classList.toggle("selected", lang==="en");
  document.querySelector("#lang-cn input").checked = (lang==="cn");
  document.querySelector("#lang-en input").checked = (lang==="en");
  renderPage();
  if (state.route === "community") renderCommunity();
}
window.setLang = setLang;

// ═══════════════════════════════════════
//  Map Page
// ═══════════════════════════════════════
let mainMap = null, minimapInstance = null, minimapMarker = null, mapInit = false;
window._minimapInstance = null; window._minimapMarker = null;
let allPoints = [];
window.allPoints = allPoints;

function initMapPage() {
  var CAMPUS_BOUNDS = [[22.5920, 113.9610], [22.5978, 113.9682]];
  var CAMPUS_CENTER = [22.59496, 113.96463];

  if (mapInit) { mainMap.invalidateSize(); mainMap.fitBounds(CAMPUS_BOUNDS); return; }
  mapInit = true;

  var IMG_BOUNDS = [[22.59880, 113.95844], [22.59119, 113.96942]];

  requestAnimationFrame(() => {
    mainMap = L.map("map-main", {
      zoomControl: true,
      attributionControl: false,
      maxBounds: [[22.5995, 113.9575], [22.590, 113.972]],
      minZoom: 15,
      maxZoom: 18
    }).fitBounds(CAMPUS_BOUNDS);
    L.imageOverlay("/assets/campus_map.jpg", IMG_BOUNDS, { opacity: 1 }).addTo(mainMap);

    minimapInstance = L.map("minimap", { zoomControl:false, attributionControl:false, dragging:true, scrollWheelZoom:false, maxBounds:[[22.5995,113.9575],[22.590,113.972]], minZoom:15, maxZoom:18 }).setView(CAMPUS_CENTER, 16);
    window._minimapInstance = minimapInstance;
    L.imageOverlay("/assets/campus_map.jpg", IMG_BOUNDS, { opacity: 1 }).addTo(minimapInstance);
    minimapInstance.on("click", closePano);

    loadMapPoints();
    console.log("Map initialized, loading points...");
  });
}

async function loadMapPoints() {
  const resp = await fetch("/api/map/points");
  const pts = await resp.json();
  state.mapPoints = pts;
  allPoints = pts;
  window.allPoints = pts;
  document.getElementById("point-count").textContent = t("map_points",{n:pts.length});

  pts.forEach(p => {
    const m = L.circleMarker([p.lat,p.lon], { radius:7, fillColor:"#7c3aed", color:"#fff", weight:2, fillOpacity:.9 }).addTo(mainMap);
    m.bindPopup(`<b>${p.id}</b><br><button style="margin-top:4px;padding:5px 14px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;" onclick="window._openPano('${p.image_url}','${p.id}',${p.lat},${p.lon})">${t("enter_pano")}</button>`);
    m.on("click", () => { console.log("Marker clicked:", p.id); window.openPano(p.image_url, p.id, p.lat, p.lon); });
  });
  console.log(pts.length + " markers added to map");
}

function setMode(mode) {
  state.mode = mode;
  document.getElementById("mode-explore").classList.toggle("active", mode==="explore");
  document.getElementById("mode-design").classList.toggle("active", mode==="design");
  if (mode === "design" && state.currentPoint) {
    document.getElementById("agent-sidebar").classList.add("open");
    // Hide map controls and minimap in design mode
    document.getElementById("pano-controls").classList.remove("show");
    document.getElementById("minimap").classList.remove("show");
    try { clearNavSprites(); } catch(e) {}
    startAgent();
  } else {
    document.getElementById("agent-sidebar").classList.remove("open");
    // Show controls back in explore mode if pano is open
    if (state.currentPoint) {
      document.getElementById("pano-controls").classList.add("show");
      document.getElementById("minimap").classList.add("show");
    }
  }
}
window.setMode = setMode;

function getRoundName(roundIdx) {
  return state.language==="en" ? ROUND_NAMES_EN[roundIdx] : ROUND_NAMES_CN[roundIdx];
}

function compilePrompt(selections) {
  const parts = ["Transform this equirectangular 360-degree panorama photo."];
  ["style","color","elements","atmosphere"].forEach(cat => {
    const sel = selections[cat];
    if (!sel) return;
    const opt = OPTIONS[cat].find(o=>o.id===sel);
    if (!opt) return;
    const prefixes = {style:"Apply",color:"Use",elements:"Feature",atmosphere:"Create a"};
    parts.push(`${prefixes[cat]} ${opt.prompt}.`);
  });
  parts.push("Preserve the 360-degree equirectangular projection format. Maintain the original scene layout and perspective.");
  return parts.join(" ");
}

// Safely reset gen-overlay to a clean hidden state
function resetGenOverlay() {
  try { var go = document.getElementById("gen-overlay"); go.classList.remove("show"); go.style.display = "none"; } catch(e) {}
  try { document.getElementById("gen-timer").textContent = "0s"; } catch(e) {}
  try { document.getElementById("gen-prompt-disp").textContent = ""; } catch(e) {}
  try { var cb = document.getElementById("gen-cancel-btn"); cb.style.display = ""; cb.textContent = "取消"; cb.onclick = cancelGeneration; } catch(e) {}
  try { document.getElementById("gen-result-actions").style.display = "none"; } catch(e) {}
}

// When showing gen-overlay, use this instead of just adding class
function showGenOverlay() {
  try { var go = document.getElementById("gen-overlay"); go.style.display = "flex"; go.classList.add("show"); } catch(e) {}
}
function safeSet(elId, prop, val) { try { document.getElementById(elId)[prop] = val; } catch(e) {} }
function safeStyle(elId, prop, val) { try { document.getElementById(elId).style[prop] = val; } catch(e) {} }

async function startAgent() {
  state.genResult = null;
  state.genProjectId = null;
  resetGenOverlay();
  safeStyle("gen-result-actions", "display", "none");
  safeSet("agent-chat", "innerHTML", "");
  safeSet("agent-options", "innerHTML", "");
  safeStyle("agent-confirm", "display", "none");
  safeStyle("agent-input-row", "display", "none");

  // Stop any background project polling timers
  Object.keys(state.activeProjects).forEach(pid => {
    try {
      if (state.activeProjects[pid]._timer) {
        clearInterval(state.activeProjects[pid]._timer);
        state.activeProjects[pid]._timer = null;
      }
    } catch(e) {}
  });

  // Try LLM agent first
  if (state.useLLM) {
    try {
      var chat = document.getElementById("agent-chat");
      chat.innerHTML = `<div class="agent-loading">
        <div class="agent-loading-spinner"></div>
        <div class="agent-loading-text">你的专属设计助手<span class="agent-loading-dots"></span>正在赶来的路上</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);">正在分析全景图场景，为你构思创意方向</div>
      </div>`;
      const resp = await fetch("/api/agent/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({action:"start", panorama_url: state.currentPoint.image_url, session_id:"", message:""})
      });
      if (resp.status === 503) { state.useLLM = false; startAgentFallback(); return; }
      const data = await resp.json();
      if (data.error) { console.warn("LLM agent error:", data.error); state.useLLM = false; startAgentFallback(); return; }
      chat.innerHTML = "";
      state.agentSessionId = data.session_id;
      state.agentPhase = data.phase;
      state.agentRound = data.round;
      renderAgentMessage(data.agent_text);
      updateAgentPhase(data.phase, data.options);
    } catch(e) { console.warn("LLM agent failed:", e); state.useLLM = false; startAgentFallback(); }
  } else {
    startAgentFallback();
  }
}

function startAgentFallback() {
  state.designSelections = { style:null, color:null, elements:null, atmosphere:null };
  state.designRound = 1;
  state.genResult = null;
  resetGenOverlay();
  // Use chat-based UI instead of old card-based UI
  const chat = document.getElementById("agent-chat");
  if (chat) {
    chat.innerHTML = `<div class="chat-msg agent">AI 设计助手暂不可用（LLM 未配置或连接失败）。<br><br>请检查 .env 中的 LLM_API_KEY 等配置。</div>`;
  }
  try { renderRound(); } catch(e) { console.warn("Fallback renderRound failed:", e); }
}

async function callAgent(action, message) {
  const resp = await fetch("/api/agent/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({action, panorama_url: state.currentPoint?.image_url||"", session_id: state.agentSessionId, message})
  });
  if (!resp.ok) { const d = await resp.json(); throw new Error(d.error||"Agent error"); }
  return resp.json();
}

function renderAgentMessage(text) {
  const chat = document.getElementById("agent-chat");
  const div = document.createElement("div");
  div.className = "chat-msg agent";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function renderPlayerMessage(text) {
  const chat = document.getElementById("agent-chat");
  const div = document.createElement("div");
  div.className = "chat-msg player";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateAgentPhase(phase, options) {
  state.agentPhase = phase;
  const confirmDiv = document.getElementById("agent-confirm");
  const inputRow = document.getElementById("agent-input-row");
  const optsDiv = document.getElementById("agent-options");
  optsDiv.innerHTML = "";  // No more option buttons
  confirmDiv.style.display = "none";

  // Always show text input for free-text interaction
  inputRow.style.display = "flex";
  var inp = inputRow.querySelector("input");
  if (phase === "confirming") {
    inp.placeholder = "输入你的修改想法...";
    confirmDiv.style.display = "flex";
  } else {
    inp.placeholder = "输入你的设计想法...";
  }
}

async function handleAgentOption(text) {
  renderPlayerMessage(text);
  document.getElementById("agent-options").innerHTML = "";
  try {
    const data = await callAgent("reply", text);
    state.agentRound = data.round;
    renderAgentMessage(data.agent_text);
    updateAgentPhase(data.phase, data.options);
  } catch(e) { renderAgentMessage("❌ Agent error: "+e.message); }
}

async function agentConfirm() {
  document.getElementById("agent-confirm").style.display = "none";
  document.getElementById("agent-input-row").style.display = "none";
  try {
    const data = await callAgent("confirm", "");
    state.compiledPrompt = data.final_prompt;

async function agentSendInput() {
  const input = document.getElementById("agent-input");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  renderPlayerMessage(msg);
  document.getElementById("agent-options").innerHTML = "";
  document.getElementById("agent-confirm").style.display = "none";
  document.getElementById("agent-input-row").style.display = "none";
  try {

    const data = await callAgent(action, msg);
    state.agentRound = data.round;
    renderAgentMessage(data.agent_text);
    updateAgentPhase(data.phase, data.options);
  } catch(e) { renderAgentMessage("❌ Agent error: "+e.message); }

function startGenerationWithPrompt(prompt) {

}


function renderRound() {
  const r = state.designRound - 1;
  if (r >= 4) {
    document.getElementById("agent-generate-btn").disabled = false;
    return;
  }
  const cat = ROUNDS[r];
  document.getElementById("agent-round-label").textContent = t("agent_round",{r:state.designRound});
  document.getElementById("agent-round-title").textContent = getRoundName(r);
  const grid = document.getElementById("agent-options");
  grid.innerHTML = "";
  OPTIONS[cat].forEach(opt => {
    const sel = state.designSelections[cat] === opt.id;
    const card = document.createElement("div");
    card.className = "opt-card" + (sel?" selected":"");
    card.innerHTML = `<div class="icon">${opt.icon}</div><div class="name">${opt.id}</div>`;
    card.onclick = ()=>selectOption(cat, opt.id);
    grid.appendChild(card);
  });
}

function selectOption(cat, optId) {
  state.designSelections[cat] = optId;
  if (state.designRound < 4) state.designRound++;
  const prompt = compilePrompt(state.designSelections);
  state.compiledPrompt = prompt;
  state.systemPrompt = prompt;
  document.getElementById("prompt-text").textContent = prompt;
  document.getElementById("system-prompt-input").value = prompt;
  renderRound();
  if (state.designRound >= 4) {
    // All rounds complete — re-render round 4 with selection highlighted
    state.designRound = 4;
    renderRound();
    document.getElementById("agent-generate-btn").disabled = false;
  }
}

async function startGeneration() {
  const sysInput = document.getElementById("system-prompt-input");
  const sysPrompt = (sysInput ? sysInput.value.trim() : "") || state.compiledPrompt;
  if (!sysPrompt) return;

  showGenOverlay();
  document.getElementById("gen-prompt-disp").textContent = sysPrompt.substring(0,200)+"...";
  document.getElementById("gen-result-actions").style.display = "none";
  document.getElementById("gen-timer").textContent = "提交中...";
  document.getElementById("gen-cancel-btn").style.display = "none";

  // Build form data
  const formData = new FormData();
  formData.append("prompt", sysPrompt);
  formData.append("size", "auto");
  if (state.currentPoint) {
    formData.append("point_id", state.currentPoint.id||"");
    formData.append("point_lat", String(state.currentPoint.lat||""));
    formData.append("point_lon", String(state.currentPoint.lon||""));
    formData.append("panorama_url", state.currentPoint.image_url||"");
    try {
      const blob = await fetch(state.currentPoint.image_url).then(r=>r.blob());
      formData.append("file", new File([blob], "panorama.jpg", {type:"image/jpeg"}));
    } catch(e) { console.warn("Could not attach panorama image:", e); }
  }
  formData.append("design_summary", state.compiledPrompt||"");

  try {
    const resp = await fetch("/api/projects", { method:"POST", body:formData });
    const project = await resp.json();
    if (project.error) { resetGenOverlay(); try { document.getElementById("gen-cancel-btn").style.display = ""; } catch(e) {} alert(project.error); return; }

    state.activeProjects[project.id] = project;
    state.genProjectId = project.id;
    startProjectPolling(project.id);

    // Update overlay to show background processing message
    document.getElementById("gen-timer").textContent = "已在后台开始";
    document.getElementById("gen-prompt-disp").innerHTML = `
      <div style="text-align:center;line-height:1.8;">
        <p style="font-size:15px;margin-bottom:8px;">🎨 新的场景生成过程需要 <b>3-5 分钟</b></p>
        <p style="font-size:13px;color:rgba(255,255,255,.6);">你可以去其他场景继续创作，之后在<b>首页</b>找到你的历史项目</p>
        <p style="font-size:13px;color:rgba(255,255,255,.6);">点击下方"返回首页"或关闭此窗口即可继续浏览</p>
      </div>`;
    document.getElementById("gen-cancel-btn").style.display = "";
    document.getElementById("gen-cancel-btn").textContent = "返回首页";
    document.getElementById("gen-cancel-btn").onclick = () => { resetGenOverlay(); navigate("welcome"); };
  } catch(e) {
    resetGenOverlay(); try { document.getElementById("gen-cancel-btn").style.display = ""; } catch(e) {} alert("Request failed: "+e.message);
  }
}

function stopGenTimer() {
  if (state.genTimer) { clearInterval(state.genTimer); state.genTimer = null; }
}

function cancelGeneration() {
  stopGenTimer();
  if (state.pollingTimer) { clearInterval(state.pollingTimer); state.pollingTimer = null; }
  resetGenOverlay();
  try { document.getElementById("gen-cancel-btn").style.display = ""; } catch(e) {}
}

function startProjectPolling(projectId) {
  if (state.activeProjects[projectId]?._timer) clearInterval(state.activeProjects[projectId]._timer);

  let attempts = 0;
  const timer = setInterval(async () => {
    attempts++;
    try {
      const resp = await fetch(`/api/projects/${projectId}/status`);
      const proj = await resp.json();
      state.activeProjects[projectId] = proj;
      if (proj.status === "done") {
        clearInterval(timer);
        state.activeProjects[projectId]._timer = null;
        state.genResult = { image_url: proj.result_url, prompt: proj.prompt };
        // Only auto-load if user is still waiting on THIS project
        if (state.genProjectId === projectId) {
          resetGenOverlay();
          document.getElementById("gen-result-actions").style.display = "block";
          document.getElementById("gen-cancel-btn").style.display = "";
          document.getElementById("gen-cancel-btn").textContent = "取消";
          document.getElementById("gen-cancel-btn").onclick = cancelGeneration;
          window._loadPanorama(proj.result_url);
          state.genProjectId = null;
          // Update currentPoint for edit/share
          if (state.currentPoint) {
            state.currentPoint.image_url_result = proj.result_url;
          }
        }
        // Refresh my designs on welcome page
        loadMyDesigns();
      } else if (proj.status === "failed") {
        clearInterval(timer);
        state.activeProjects[projectId]._timer = null;
      }
    } catch(e) { console.warn("Project poll error:", e); }
    if (attempts > 200) { clearInterval(timer); }
  }, 8000);
}

function editMore() {

  startAgent();
}

async function shareToCommunity() {
  if (!state.genResult) return;
  const originalUrl = state.genResult.image_url;
  const prompt = state.genResult.prompt;

  // 1. Immediately create community post with original image
  const postData = {
    prompt: prompt,
    image_url: originalUrl,
    original_pano: state.currentPoint?.image_url||"",
    point_id: state.currentPoint?.id||"",
    selections: state.designSelections,
  };
  let postId = null;
  try {
    const resp = await fetch("/api/community/posts", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(postData)});
    const post = await resp.json();
    postId = post.id;
  } catch(e) { alert("分享失败: "+e.message); return; }

  // 2. Navigate to community immediately
  navigate("community");

  // 3. Background 4K upscaling (silent, no overlay)
  const fd = new FormData();
  fd.append("prompt", "提升分辨率到4k，不要改变图像比例");
  fd.append("resolution", "4K");
  fd.append("aspect_ratio", "auto");
  try {
    const blob = await fetch(originalUrl).then(r=>r.blob());
    fd.append("file", new File([blob], "gen.jpg", {type:"image/jpeg"}));
  } catch(e) { return; } // Can't upscale, original stays

  try {
    const resp = await fetch("/api/nano/generate", { method:"POST", body:fd });
    const data = await resp.json();
    if (data.error) return; // Silent fail, original stays
    const tid = data.task_id;
    const poll = setInterval(async () => {
      try {
        const r = await fetch(`/api/nano/result/${tid}`);
        const d = await r.json();
        if (d.status === "success" && d.image_url && postId) {
          clearInterval(poll);
          // Update community post with 4K image
          await fetch(`/api/community/posts/${postId}`, {
            method:"PUT", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({image_url: d.image_url})
          });
          // Refresh community view if user is on community page
          if (state.route === "community") renderCommunity();
        } else if (d.status === "failed") {
          clearInterval(poll);
        }
      } catch(e) { clearInterval(poll); }
    }, 5000);
  } catch(e) {} // Silent fail
}

async function renderCommunity() {
  const grid = document.getElementById("community-grid");
  try {
    const resp = await fetch("/api/community/posts");
    state.communityPosts = await resp.json();
  } catch(e) { state.communityPosts = []; }
  let posts = [...state.communityPosts];
  if (state.communitySort === "hot") posts.sort((a,b)=>b.likes-a.likes);
  else posts.sort((a,b)=>b.timestamp-a.timestamp);

  if (posts.length === 0) {
    grid.innerHTML = `<div class="community-empty"><div class="empty-icon">🏜️</div><p>${t("community_empty")}</p></div>`;
    return;
  }
  grid.innerHTML = posts.map(p => `
    <div class="community-card" style="position:relative;" data-pano="${p.id}" style="cursor:pointer;">
      <img src="${p.image_url}" alt="design" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22180%22><rect fill=%22%231a1030%22 width=%22300%22 height=%22180%22/><text fill=%22%23aaa%22 x=%22150%22 y=%2295%22 text-anchor=%22middle%22 font-size=%2214%22>Image N/A</text></svg>'">
      <div class="card-body">
        <div class="card-prompt">${p.prompt||""}</div>
        <div class="card-meta">
          <span class="card-likes">❤️ ${p.likes||0}</span>
          <span class="card-author">${p.author||"anonymous"}</span>
        </div>
      </div>
      ${state.isAdmin ? `<button data-delete="${p.id}" onclick="event.stopPropagation();if(confirm('确认删除？')){fetch('/api/community/posts/${p.id}',{method:'DELETE'}).then(r=>r.json()).then(d=>{if(d.error)alert(d.error);else location.reload();})}" style="position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;border:2px solid #fff;background:rgba(255,0,0,.85);color:#fff;cursor:pointer;font-size:16px;line-height:1;z-index:10;pointer-events:auto;">×</button>` : ''}
    </div>
  `).join("");
  // Single delegated click handler on the grid
  grid.onclick = (e) => {
    const delBtn = e.target.closest("[data-delete]");
    if (delBtn) {
      deletePost(delBtn.dataset.delete);
      return;
    }
    const card = e.target.closest("[data-pano]");
    if (card) {
      openCommunityPano(card.dataset.pano);
    }
  };
}

async function loadMyDesigns() {
  if (!state.loggedIn) return;
  try {
    const resp = await fetch("/api/projects");
    const projects = await resp.json();
    const section = document.getElementById("my-designs-section");
    const grid = document.getElementById("my-designs-grid");
    if (!projects || projects.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    // Restart polling for any still-generating projects
    projects.forEach(p => {
      if (p.status === "generating" && !state.activeProjects[p.id]?._timer) {
        state.activeProjects[p.id] = p;
        startProjectPolling(p.id);
      }
    });
    grid.innerHTML = projects.slice(0, 8).map(p => {
      const isDone = p.status === "done";
      const statusBadge = isDone
        ? `<span style="position:absolute;top:6px;right:6px;background:#22c55e;color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;z-index:2;">已完成</span>`
        : `<span style="position:absolute;top:6px;right:6px;background:rgba(234,179,8,.9);color:#000;font-size:10px;padding:2px 8px;border-radius:8px;z-index:2;animation:pulse 1.5s ease-in-out infinite;">生成中</span>`;
      const imgSrc = isDone ? p.result_url : p.panorama_url;
      const onclick = isDone
        ? `event.stopPropagation();viewProjectResult('${p.id}','${p.result_url}','${(p.point_lat||'')}','${(p.point_lon||'')}')`
        : `event.stopPropagation();showProjectProgress('${p.id}')`;
      return `
        <div style="position:relative;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:all .2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='rgba(255,255,255,.08)'" onclick="${onclick}">
          <img src="${imgSrc}" style="width:100%;height:100px;object-fit:cover;" loading="lazy" onerror="this.style.display='none'">
          ${statusBadge}
          <div style="padding:8px;font-size:11px;color:var(--text2);">${(p.prompt||"").substring(0,40)}...</div>
        </div>`;
    }).join("");
  } catch(e) {}
}

async function viewProjectResult(projectId, resultUrl, lat, lon) {
  // Fetch full project data from backend
  let proj = state.activeProjects[projectId];

    try {
      const resp = await fetch(`/api/projects/${projectId}/status`);
      proj = await resp.json();
      state.activeProjects[projectId] = proj;
    } catch(e) { proj = proj || {}; }
  }
  state.genResult = { image_url: resultUrl, prompt: proj?.prompt||"" };
  state.mode = "explore";
  const ptLat = parseFloat(lat) || 22.59496;
  const ptLon = parseFloat(lon) || 113.96463;
  navigate("map");
  setTimeout(() => {
    openPano(resultUrl, projectId, ptLat, ptLon);
    // After openPano resets gen-overlay, populate agent sidebar with project context
    setTimeout(() => {
      const chat = document.getElementById("agent-chat");
      const summary = proj?.design_summary || proj?.prompt || "";
      chat.innerHTML = `
        <div class="chat-msg agent">
          <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px;">📋 设计概念</div>
          <div style="font-size:13px;line-height:1.6;">${summary.substring(0, 300)}</div>
        </div>
        <div class="chat-msg agent">
          <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px;">🎨 生成提示词</div>
          <div style="font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;">${(proj?.prompt||"").substring(0, 200)}</div>
        </div>`;
      chat.scrollTop = chat.scrollHeight;
      // Restore compiledPrompt for editMore
      state.compiledPrompt = proj?.prompt || "";
      state.systemPrompt = proj?.prompt || "";
      // Show agent sidebar and result actions
      document.getElementById("agent-sidebar").classList.add("open");
      document.getElementById("gen-result-actions").style.display = "block";
      // Set up the panorama as currentPoint for edit/share
      if (state.currentPoint) {
        state.currentPoint.image_url = resultUrl;
      }
    }, 300);
  }, 500);
}

function showProjectProgress(projectId) {
  const proj = state.activeProjects[projectId];
  showGenOverlay();
  document.getElementById("gen-cancel-btn").style.display = "";
  document.getElementById("gen-cancel-btn").textContent = "关闭";
  document.getElementById("gen-cancel-btn").onclick = () => resetGenOverlay();
  document.getElementById("gen-result-actions").style.display = "none";
  if (proj && proj.status === "done") {
    resetGenOverlay();
    if (proj.result_url) viewProjectResult(projectId, proj.result_url, proj.point_lat, proj.point_lon);
    return;
  }
  document.getElementById("gen-timer").textContent = "生成中...";
  document.getElementById("gen-prompt-disp").innerHTML = `
    <div style="text-align:center;line-height:1.8;">
      <p style="font-size:15px;">🎨 场景正在生成中，预计还需 <b>3-5 分钟</b></p>
      <p style="font-size:13px;color:rgba(255,255,255,.6);">完成后会自动出现在这里</p>
    </div>`;
  // Ensure polling is active
  if (!state.activeProjects[projectId]?._timer && proj) {
    startProjectPolling(projectId);
  }
}
</script>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }

<script type="module">
import * as THREE from "three";

// ═══════════════════════════════════════
//  Main Panorama Viewer
// ═══════════════════════════════════════
let panoRenderer=null, panoScene=null, panoCamera=null, panoMat=null, panoAnimId=null;
let navSprites=[], hoveredSprite=null;
const panoState = { lat:0, lon:0, fov:75, autoRotate:true, isDragging:false, prevMouse:{x:0,y:0} };
const raycaster = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();

function initPano() {
  if (panoRenderer) return;
  panoScene = new THREE.Scene();
  panoCamera = new THREE.PerspectiveCamera(75,2,.1,100);
  panoCamera.position.set(0,0,0);
  panoRenderer = new THREE.WebGLRenderer({antialias:true});
  panoRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  panoRenderer.outputColorSpace = THREE.SRGBColorSpace;
  document.getElementById("pano-canvas-wrap").appendChild(panoRenderer.domElement);
  const geo = new THREE.SphereGeometry(50,128,64);
  panoMat = new THREE.MeshBasicMaterial({side:THREE.BackSide});
  panoScene.add(new THREE.Mesh(geo, panoMat));
  resizePano(); updatePanoCam(); animatePano();
}

function resizePano() {
  if (!panoRenderer) return;
  panoRenderer.setSize(innerWidth, innerHeight);
  panoCamera.aspect = innerWidth/Math.max(innerHeight,1);
  panoCamera.updateProjectionMatrix();
}

function updatePanoCam() {
  if (!panoCamera) return;
  const phi = Math.PI/2 - panoState.lat;
  const x = 50*Math.sin(phi)*Math.sin(panoState.lon);
  const y = 50*Math.cos(phi);
  const z = 50*Math.sin(phi)*Math.cos(panoState.lon);
  panoCamera.lookAt(x,y,z);
  panoCamera.fov = panoState.fov;
  panoCamera.updateProjectionMatrix();
}

function animatePano() {
  panoAnimId = requestAnimationFrame(animatePano);
  if (panoState.autoRotate && !panoState.isDragging && panoCamera) {
    panoState.lon += 0.0015; updatePanoCam();
  }
  if (panoRenderer && panoScene) panoRenderer.render(panoScene, panoCamera);
}

function loadPanorama(url) {
  initPano();
  const loadingEl = document.getElementById("pano-loading");
  const loadingText = document.getElementById("pano-loading-text");
  loadingText.textContent = t("pano_loading");
  loadingEl.classList.add("show");
  const loader = new THREE.TextureLoader();
  loader.load(url, (tex)=>{
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = THREE.RepeatWrapping;
    tex.repeat.x = -1;
    panoMat.map = tex; panoMat.needsUpdate = true;
    loadingEl.classList.remove("show");
    const hint = document.getElementById("pano-hint");
    hint.classList.add("show"); hint.classList.remove("fade");
    setTimeout(()=>hint.classList.add("fade"),5000);
  }, undefined, ()=>{
    loadingText.textContent = "Load failed";
  });
}
window._loadPanorama = loadPanorama;

// Nav sprites
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2){
  const dLon=toRad(lon2-lon1);
  const y=Math.sin(dLon)*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLon);
  return (toDeg(Math.atan2(y,x))+360)%360;
}

function createNavTex(dist){
  const size=128,r=50;
  const c=document.createElement("canvas");c.width=c.height=size;
  const ctx=c.getContext("2d");
  ctx.shadowColor="rgba(0,0,0,.5)";ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(r+14,r+14,r+4,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,.25)";ctx.fill();
  ctx.shadowBlur=4;
  ctx.beginPath();ctx.arc(r+14,r+14,r-4,0,Math.PI*2);
  ctx.fillStyle="rgba(124,58,237,.85)";ctx.fill();
  ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle="#fff";ctx.font="bold 36px sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("→",r+14,r+14);
  ctx.font="bold 18px sans-serif";ctx.fillText(Math.round(dist)+"m",r+14,r+50);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;return tex;
}
function clearNavSprites(){navSprites.forEach(s=>{if(s.parent)s.parent.remove(s);if(s.material)s.material.dispose();});navSprites=[];}window.clearNavSprites=clearNavSprites;
function buildNavSprites(nearby){
  clearNavSprites();if(!panoScene)return;
  const R=48;
  nearby.forEach(p=>{
    const tex=createNavTex(p.dist);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false});
    const sp=new THREE.Sprite(mat);sp.scale.set(8,8,1);
    const elev=toRad(-25),az=toRad(p.brg);
    sp.position.set(R*Math.cos(elev)*Math.sin(az),R*Math.sin(elev),R*Math.cos(elev)*Math.cos(az));
    sp.userData=p;sp.renderOrder=1;panoScene.add(sp);navSprites.push(sp);
  });
}
function getIntersectedSprite(e){
  if(!panoCamera||navSprites.length===0)return null;
  const rect=panoRenderer.domElement.getBoundingClientRect();
  mouse2.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse2.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2,panoCamera);
  const hits=raycaster.intersectObjects(navSprites);
  return hits.length>0?hits[0].object:null;
}

function syncMinimap(lat,lon){
  const mm = window._minimapInstance; if(!mm)return;
  mm.setView([lat,lon],16);
  if(window._minimapMarker) mm.removeLayer(window._minimapMarker);
  window._minimapMarker = L.circleMarker([lat,lon],{radius:6,fillColor:"#7c3aed",color:"#fff",weight:2,fillOpacity:1}).addTo(mm);
}

function openPano(url,id,lat,lon){
  try {
  console.log("openPano called:", id, url);
  resetGenOverlay();
  state.genProjectId = null;

  initPano();
  window.state.currentPoint = {image_url:url,id,lat,lon};
  document.getElementById("pano-layer").classList.add("active");
  document.getElementById("mode-toggle").style.display = "flex";

  const isDesign = window.state.mode === "design";
  if (!isDesign) {
    document.getElementById("pano-controls").classList.add("show");
    document.getElementById("minimap").classList.add("show");
    syncMinimap(lat||22.595,lon||113.965);
  }
  document.getElementById("pano-close-btn").classList.add("show");
  document.getElementById("topbar").classList.add("transparent");
  document.getElementById("pano-id-tag").textContent = id||"";
  document.getElementById("pano-id-tag").classList.add("show");
  panoState.lat=0;panoState.lon=0;panoState.fov=75;panoState.autoRotate=true;
  document.getElementById("btn-auto").classList.add("active");
  updatePanoCam();loadPanorama(url);resizePano();

  // Show agent sidebar if in design mode
  if (isDesign) {
    document.getElementById("agent-sidebar").classList.add("open");
    startAgent();
  }

  // Build nav sprites (only in explore mode)
  if (!isDesign && window.allPoints && window.allPoints.length>0) {
    const nearby = window.allPoints
      .filter(p=>p.id!==(window.state.currentPoint?window.state.currentPoint.id:""))
      .map(p=>({...p,dist:haversine(lat||22.595,lon||113.965,p.lat,p.lon),brg:bearing(lat||22.595,lon||113.965,p.lat,p.lon)}))
      .filter(p=>p.dist<30&&p.dist>1).sort((a,b)=>a.dist-b.dist).slice(0,8);
    if(nearby.length>0)buildNavSprites(nearby);
  }
  } catch(e) { console.error("openPano error:", e); alert("Panorama error: "+e.message); }
}
window.openPano = openPano;
window._openPano = openPano;

function closePano(){
  document.getElementById("pano-layer").classList.remove("active");
  document.getElementById("pano-controls").classList.remove("show");
  document.getElementById("pano-close-btn").classList.remove("show");
  document.getElementById("minimap").classList.remove("show");
  document.getElementById("nav-sprites")?.remove();
  document.getElementById("mode-toggle").style.display = "none";
  document.getElementById("topbar").classList.remove("transparent");
  document.getElementById("pano-id-tag").classList.remove("show");
  document.getElementById("pano-hint").classList.remove("show","fade");
  document.getElementById("pano-loading").classList.remove("show");
  document.getElementById("agent-sidebar").classList.remove("open");
  clearNavSprites();hoveredSprite=null;
  window.state.currentPoint=null;
  window.state.mode = "explore";
  panoState.autoRotate=true;
  document.getElementById("btn-auto").classList.add("active");
  cancelGeneration();
}
window.closePano = closePano;

// Mouse / touch
document.getElementById("pano-canvas-wrap").addEventListener("mousedown",(e)=>{
  if(e.button!==0)return;
  const hit=getIntersectedSprite(e);if(hit)return;
  panoState.isDragging=true;panoState.autoRotate=false;
  document.getElementById("btn-auto").classList.remove("active");
  panoState.prevMouse={x:e.clientX,y:e.clientY};
});
window.addEventListener("mousemove",(e)=>{
  // Hover sprites
  if(document.getElementById("pano-layer").classList.contains("active")){
    const hit=getIntersectedSprite(e);
    if(hoveredSprite&&hoveredSprite!==hit){hoveredSprite.material.opacity=.85;hoveredSprite.scale.set(8,8,1);}
    if(hit){hit.material.opacity=1;hit.scale.set(10,10,1);}
    hoveredSprite=hit;
  }
  if(!panoState.isDragging||!panoCamera)return;
  const dx=e.clientX-panoState.prevMouse.x,dy=e.clientY-panoState.prevMouse.y;
  panoState.lon+=dx*.003;panoState.lat+=dy*.003;
  panoState.lat=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,panoState.lat));
  panoState.prevMouse={x:e.clientX,y:e.clientY};updatePanoCam();
});
window.addEventListener("mouseup",()=>{panoState.isDragging=false;});
document.getElementById("pano-canvas-wrap").addEventListener("wheel",(e)=>{
  e.preventDefault();
  panoState.fov=Math.max(20,Math.min(120,panoState.fov+e.deltaY*.05));updatePanoCam();
},{passive:false});
document.getElementById("pano-canvas-wrap").addEventListener("click",(e)=>{
  if(panoState.isDragging)return;
  const hit=getIntersectedSprite(e);
  if(hit&&hit.userData){const p=hit.userData;openPano(p.image_url,p.id,p.lat,p.lon);}
});
window.addEventListener("resize",resizePano);

// Pano controls
document.getElementById("btn-auto").addEventListener("click",function(){
  panoState.autoRotate=!panoState.autoRotate;this.classList.toggle("active",panoState.autoRotate);
});
document.getElementById("btn-zoom-in").addEventListener("click",()=>{panoState.fov=Math.max(20,panoState.fov-10);updatePanoCam();});
document.getElementById("btn-zoom-out").addEventListener("click",()=>{panoState.fov=Math.min(120,panoState.fov+10);updatePanoCam();});
document.getElementById("btn-reset").addEventListener("click",()=>{
  panoState.lat=0;panoState.lon=0;panoState.fov=75;panoState.autoRotate=true;
  document.getElementById("btn-auto").classList.add("active");updatePanoCam();
});

// Touch
document.getElementById("pano-canvas-wrap").addEventListener("touchstart",(e)=>{
  if(e.touches.length===1){panoState.isDragging=true;panoState.autoRotate=false;
  document.getElementById("btn-auto").classList.remove("active");panoState.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}
});
document.getElementById("pano-canvas-wrap").addEventListener("touchmove",(e)=>{
  if(!panoState.isDragging||e.touches.length!==1)return;e.preventDefault();
  const dx=e.touches[0].clientX-panoState.prevMouse.x,dy=e.touches[0].clientY-panoState.prevMouse.y;
  panoState.lon+=dx*.003;panoState.lat+=dy*.003;
  panoState.lat=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,panoState.lat));
  panoState.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};updatePanoCam();
},{passive:false});
document.getElementById("pano-canvas-wrap").addEventListener("touchend",()=>{panoState.isDragging=false;});

function closeAgentSidebar() {
  document.getElementById("agent-sidebar").classList.remove("open");
}
window.closeAgentSidebar = closeAgentSidebar;

// ═══════════════════════════════════════
//  Community Panorama Viewer
// ═══════════════════════════════════════
let commRenderer=null,commScene=null,commCamera=null,commMat=null,commAnimId=null;
const commState = {lat:0,lon:0,fov:75,autoRotate:true,isDragging:false,prevMouse:{x:0,y:0}};
const commCanvas = document.getElementById("comm-pano-canvas");

function initCommPano(){
  if(commRenderer)return;
  commScene=new THREE.Scene();commCamera=new THREE.PerspectiveCamera(75,2,.1,100);commCamera.position.set(0,0,0);
  commRenderer=new THREE.WebGLRenderer({antialias:true});
  commRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  commRenderer.outputColorSpace=THREE.SRGBColorSpace;
  commCanvas.appendChild(commRenderer.domElement);
  commMat=new THREE.MeshBasicMaterial({side:THREE.BackSide});
  commScene.add(new THREE.Mesh(new THREE.SphereGeometry(50,128,64),commMat));
  resizeComm();updateCommCam();animateComm();
}
function resizeComm(){
  if(!commRenderer)return;
  const w=commCanvas.clientWidth,h=commCanvas.clientHeight;
  commRenderer.setSize(w,h);commCamera.aspect=w/Math.max(h,1);commCamera.updateProjectionMatrix();
}
function updateCommCam(){
  if(!commCamera)return;
  const phi=Math.PI/2-commState.lat;
  commCamera.lookAt(50*Math.sin(phi)*Math.sin(commState.lon),50*Math.cos(phi),50*Math.sin(phi)*Math.cos(commState.lon));
  commCamera.fov=commState.fov;commCamera.updateProjectionMatrix();
}
function animateComm(){
  commAnimId=requestAnimationFrame(animateComm);
  if(commState.autoRotate&&!commState.isDragging&&commCamera){commState.lon+=0.0015;updateCommCam();}
  if(commRenderer&&commScene)commRenderer.render(commScene,commCamera);
}

function openCommunityPano(postId){

  });

}
window.openCommunityPano = openCommunityPano;

async function deletePost(id) {
  if (!confirm("确认删除该作品？")) return;
  try {
    const resp = await fetch(`/api/community/posts/${id}`, {method:"DELETE"});
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    renderCommunity();
  } catch(e) { alert("删除失败: "+e.message); }

}
window.closeCommunityPano = closeCommunityPano;

async function toggleLike(){
  const pid=window._commPostId;if(!pid)return;
  const post=window.state.communityPosts.find(p=>p.id===pid);if(!post)return;
  const liked=window.state.userLikes[pid];

  try{const r=await fetch(url,{method:"POST"});const d=await r.json();if(d.error)return;window.state.userLikes[pid]=!liked;post.likes=d.likes;}catch(e){}
  document.getElementById("comm-pano-likes").textContent="❤️ "+(post.likes||0);

function toggleCommAuto(){commState.autoRotate=!commState.autoRotate;}

// Community pano mouse/touch
commCanvas.addEventListener("mousedown",(e)=>{
  if(e.button!==0)return;
  commState.isDragging=true;commState.autoRotate=false;commState.prevMouse={x:e.clientX,y:e.clientY};

window.addEventListener("mousemove",(e)=>{

});
window.addEventListener("mouseup",()=>{commState.isDragging=false;});
commCanvas.addEventListener("wheel",(e)=>{
  e.preventDefault();commState.fov=Math.max(20,Math.min(120,commState.fov+e.deltaY*.05));updateCommCam();
},{passive:false});
commCanvas.addEventListener("contextmenu",(e)=>e.preventDefault());
