<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° 全景场景查看器</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #1e78ff;
            --panel-bg: rgba(20, 20, 20, 0.92);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden; height: 100vh;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        /* Three.js canvas fills the whole viewport */
        #viewer-container { position: fixed; inset: 0; cursor: grab; }
        #viewer-container:active { cursor: grabbing; }
        #viewer-container.panning { cursor: move; }

        /* Upload overlay */
        #upload-overlay {
            position: fixed; inset: 0; display: flex; align-items: center;
            justify-content: center; background: rgba(0,0,0,0.85); z-index: 100;
            transition: opacity 0.4s;
        }
        #upload-overlay.hidden { opacity: 0; pointer-events: none; }
        .upload-box {
            background: var(--panel-bg); border-radius: var(--radius); padding: 40px;
            text-align: center; max-width: 460px; width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
        }
        .upload-box h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .upload-box .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.25); border-radius: var(--radius);
            padding: 48px 24px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
            margin-bottom: 16px;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent); background: rgba(30,120,255,0.08);
        }
        .upload-zone .icon { font-size: 48px; line-height: 1; margin-bottom: 12px; }
        .upload-zone .text { font-size: 15px; margin-bottom: 4px; }
        .upload-zone .hint { font-size: 13px; color: var(--text-secondary); }
        .upload-zone .hint a { color: var(--accent); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 12px 28px; font-size: 15px; font-weight: 600; border: none;
            border-radius: 8px; cursor: pointer; transition: background 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-primary:hover { background: #0056d6; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-msg { margin-top: 12px; font-size: 13px; color: var(--text-secondary); min-height: 18px; }

        /* Toolbar */
        #toolbar {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 50;
            display: flex; gap: 8px; background: var(--panel-bg);
            border-radius: 28px; padding: 6px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); transition: opacity 0.3s;
        }
        #toolbar.hidden { opacity: 0; pointer-events: none; }
        .tool-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: transparent; color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; font-size: 18px;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.1); }
        .tool-btn.active { background: var(--accent); }
        .tool-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Hint text */
        #hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 30; font-size: 13px; color: rgba(255,255,255,0.6);
            transition: opacity 0.6s;
        }
        #hint.fade { opacity: 0; }

        /* Loading spinner */
        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 16px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 600px) {
            #toolbar { bottom: 16px; padding: 4px; gap: 4px; }
            .tool-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <!-- Upload overlay -->
    <div id="upload-overlay">
        <div class="upload-box">
            <h2>360° 全景场景查看器</h2>
            <p class="subtitle">上传一张等距柱状投影(Equirectangular)全景图，拖拽鼠标旋转视角</p>
            <div class="upload-zone" id="upload-zone">
                <div class="icon">🌐</div>
                <div class="text">点击上传或拖拽全景图</div>
                <div class="hint">支持 JPG / PNG / WebP &nbsp;·&nbsp; 推荐 2:1 比例的全景图</div>
                <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden>
            </div>
            <button class="btn btn-primary" id="demo-btn">加载演示全景图</button>
            <div id="status-msg" class="status-msg"></div>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" class="hidden">
        <button class="tool-btn active" id="btn-auto-rotate" title="自动旋转">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 3 15 5"/><polyline points="3 12 7 12"/></svg>
        </button>
        <button class="tool-btn" id="btn-zoom-in" title="放大">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="tool-btn" id="btn-zoom-out" title="缩小">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="tool-btn" id="btn-reset" title="重置视角">
            <svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M21 3l-6.5 6.5"/><path d="M3 21v-6h6"/><path d="M3 21l6.5-6.5"/></svg>
        </button>
        <button class="tool-btn" id="btn-fullscreen" title="全屏">
            <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
        <button class="tool-btn" id="btn-change" title="更换图片">
            <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
    </div>

    <div id="hint">🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
    import * as THREE from "three";

    // ── DOM refs ────────────────────────
    const container = document.getElementById("viewer-container");
    const overlay = document.getElementById("upload-overlay");
    const uploadZone = document.getElementById("upload-zone");
    const fileInput = document.getElementById("file-input");
    const demoBtn = document.getElementById("demo-btn");
    const statusMsg = document.getElementById("status-msg");
    const toolbar = document.getElementById("toolbar");
    const hint = document.getElementById("hint");

    // ── Three.js setup ──────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 100);
    camera.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ── Sphere ──────────────────────────
    const geometry = new THREE.SphereGeometry(50, 128, 64);
    const material = new THREE.MeshBasicMaterial({ side: THREE.BackSide });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // ── State ───────────────────────────
    const state = {
        lat: 0,          // vertical angle (radians)
        lon: 0,          // horizontal angle (radians)
        fov: 75,
        autoRotate: true,
        autoRotateSpeed: 0.15,
        isDragging: false,
        isRightDrag: false,
        prevMouse: { x: 0, y: 0 },
        prevTouches: null,
    };

    // ── Update camera from spherical coords ──
    function updateCamera() {
        const phi = Math.PI / 2 - state.lat;
        const x = 50 * Math.sin(phi) * Math.sin(state.lon);
        const y = 50 * Math.cos(phi);
        const z = 50 * Math.sin(phi) * Math.cos(state.lon);
        camera.lookAt(x, y, z);
        camera.fov = state.fov;
        camera.updateProjectionMatrix();
    }

    // ── Load texture ────────────────────
    function loadPanorama(url) {
        statusMsg.innerHTML = '<div class="spinner"></div>';
        const loader = new THREE.TextureLoader();
        loader.load(
            url,
            (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                texture.wrapS = THREE.RepeatWrapping;
                texture.repeat.x = -1;
                material.map = texture;
                material.needsUpdate = true;
                statusMsg.innerHTML = "";
                overlay.classList.add("hidden");
                toolbar.classList.remove("hidden");
                hint.classList.remove("fade");
                setTimeout(() => hint.classList.add("fade"), 6000);
                updateCamera();
            },
            undefined,
            () => {
                statusMsg.innerHTML = '<span style="color:#ff3b30">加载失败，请检查图片格式</span>';
            }
        );
    }

    // ── Upload flow ─────────────────────
    async function handleFile(file) {
        if (!file.type.startsWith("image/")) {
            statusMsg.innerHTML = '<span style="color:#ff3b30">不支持的文件类型</span>';
            return;
        }
        const fd = new FormData();
        fd.append("file", file);
        try {
            const resp = await fetch("/api/panorama/upload", { method: "POST", body: fd });
            const data = await resp.json();
            if (data.error) {
                statusMsg.innerHTML = `<span style="color:#ff3b30">${data.error}</span>`;
                return;
            }
            loadPanorama(data.image_url);
        } catch (err) {
            statusMsg.innerHTML = `<span style="color:#ff3b30">上传失败: ${err.message}</span>`;
        }
    }

    uploadZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("drag-over");
    });
    uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("drag-over");
    });
    uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    // ── Demo button ─────────────────────
    demoBtn.addEventListener("click", () => {
        // Use a well-known free equirectangular sample
        loadPanorama("https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg");
    });

    // ── Mouse controls ──────────────────
    container.addEventListener("mousedown", (e) => {
        if (e.button === 2) {
            state.isRightDrag = true;
            container.classList.add("panning");
        } else if (e.button === 0) {
            state.isDragging = true;
            state.autoRotate = false;
            document.getElementById("btn-auto-rotate").classList.remove("active");
        }
        state.prevMouse = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener("mousemove", (e) => {
        if (!state.isDragging && !state.isRightDrag) return;
        const dx = e.clientX - state.prevMouse.x;
        const dy = e.clientY - state.prevMouse.y;

        if (state.isDragging) {
            state.lon += dx * 0.003;
            state.lat += dy * 0.003;
            state.lat = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, state.lat));
        }
        if (state.isRightDrag) {
            state.fov = Math.max(20, Math.min(120, state.fov + dy * 0.1));
        }

        state.prevMouse = { x: e.clientX, y: e.clientY };
        updateCamera();
    });

    window.addEventListener("mouseup", () => {
        state.isDragging = false;
        state.isRightDrag = false;
        container.classList.remove("panning");
    });

    container.addEventListener("wheel", (e) => {
        e.preventDefault();
        state.fov = Math.max(20, Math.min(120, state.fov + e.deltaY * 0.05));
        updateCamera();
    }, { passive: false });

    container.addEventListener("contextmenu", (e) => e.preventDefault());

    // ── Touch controls ──────────────────
    container.addEventListener("touchstart", (e) => {
        if (e.touches.length === 1) {
            state.isDragging = true;
            state.autoRotate = false;
            document.getElementById("btn-auto-rotate").classList.remove("active");
            state.prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            state.isDragging = false;
            state.prevTouches = {
                x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
                dist: Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                ),
            };
        }
    });

    container.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && state.isDragging) {
            const dx = e.touches[0].clientX - state.prevMouse.x;
            const dy = e.touches[0].clientY - state.prevMouse.y;
            state.lon += dx * 0.003;
            state.lat += dy * 0.003;
            state.lat = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, state.lat));
            state.prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            updateCamera();
        } else if (e.touches.length === 2 && state.prevTouches) {
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            state.fov = Math.max(20, Math.min(120, state.fov - (dist - state.prevTouches.dist) * 0.1));
            state.prevTouches.dist = dist;
            updateCamera();
        }
    }, { passive: false });

    container.addEventListener("touchend", () => {
        state.isDragging = false;
        state.prevTouches = null;
    });

    // ── Toolbar buttons ─────────────────
    document.getElementById("btn-auto-rotate").addEventListener("click", function () {
        state.autoRotate = !state.autoRotate;
        this.classList.toggle("active", state.autoRotate);
    });

    document.getElementById("btn-zoom-in").addEventListener("click", () => {
        state.fov = Math.max(20, state.fov - 10);
        updateCamera();
    });

    document.getElementById("btn-zoom-out").addEventListener("click", () => {
        state.fov = Math.min(120, state.fov + 10);
        updateCamera();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
        state.lat = 0; state.lon = 0; state.fov = 75;
        state.autoRotate = true;
        document.getElementById("btn-auto-rotate").classList.add("active");
        updateCamera();
    });

    document.getElementById("btn-fullscreen").addEventListener("click", () => {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        } else {
            document.body.requestFullscreen();
        }
    });

    document.getElementById("btn-change").addEventListener("click", () => {
        overlay.classList.remove("hidden");
        toolbar.classList.add("hidden");
    });

    // ── Keyboard ────────────────────────
    window.addEventListener("keydown", (e) => {
        switch (e.key.toLowerCase()) {
            case "a": state.lon -= 0.05; break;
            case "d": state.lon += 0.05; break;
            case "w": state.lat += 0.05; break;
            case "s": state.lat -= 0.05; break;
            case "r": state.autoRotate = !state.autoRotate;
                document.getElementById("btn-auto-rotate").classList.toggle("active", state.autoRotate);
                break;
            case "f": if (!document.fullscreenElement) document.body.requestFullscreen(); break;
            default: return;
        }
        state.lat = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, state.lat));
        updateCamera();
    });

    // ── Resize ──────────────────────────
    window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    // ── Render loop ─────────────────────
    function animate() {
        requestAnimationFrame(animate);
        if (state.autoRotate && !state.isDragging) {
            state.lon += state.autoRotateSpeed * 0.01;
            updateCamera();
        }
        renderer.render(scene, camera);
    }
    animate();
    updateCamera();

    console.log("360° 全景查看器就绪");
    console.log("🖱 左键拖拽旋转 | 滚轮缩放 | 右键平移 | WASD键盘控制 | R切换自动旋转");
    </script>
</body>
</html>
